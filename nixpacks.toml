[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo", "php82Extensions.pdo_mysql", "php82Extensions.mbstring", "php82Extensions.tokenizer", "php82Extensions.xml", "php82Extensions.ctype", "php82Extensions.fileinfo", "php82Extensions.bcmath", "php82Extensions.curl", "php82Extensions.zip", "php82Extensions.gd", "php82Packages.composer", "nodejs_20"]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction",
  "npm install",
  "npm run build"
]

[phases.build]
cmds = [
  "php artisan storage:link"
]

[start]
cmd = "test -n \"$APP_KEY\" || { echo 'FATAL: APP_KEY is not set — deploy aborted to prevent session invalidation.' >&2; exit 1; } && mkdir -p /app/storage/app/private /app/storage/app/public /app/storage/framework/sessions /app/storage/framework/views /app/storage/framework/cache /app/storage/logs && php artisan storage:link --force && php artisan config:clear && php artisan cache:clear && php artisan route:clear && php artisan view:clear && php artisan migrate --force --isolated && php -d upload_max_filesize=128M -d post_max_size=256M -d max_execution_time=300 -d max_input_time=300 -S 0.0.0.0:$PORT -t public"
