[phases.setup]
nixPkgs = ["php83", "php83Extensions.pdo", "php83Extensions.pdo_mysql", "php83Extensions.mbstring", "php83Extensions.tokenizer", "php83Extensions.xml", "php83Extensions.ctype", "php83Extensions.fileinfo", "php83Extensions.bcmath", "php83Extensions.curl", "php83Extensions.zip", "php83Extensions.gd", "php83Extensions.redis", "php83Extensions.intl", "php83Packages.composer", "nodejs_20"]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction",
  "npm install",
  "npm run build"
]

[phases.build]
cmds = [
  "php artisan storage:link",
  "php artisan filament:assets"
]

[start]
cmd = "test -n \"$APP_KEY\" || { echo 'FATAL: APP_KEY is not set — deploy aborted to prevent session invalidation.' >&2; exit 1; } && mkdir -p /app/storage/app/private /app/storage/app/public /app/storage/framework/sessions /app/storage/framework/views /app/storage/framework/cache /app/storage/logs && php artisan storage:link --force && php artisan config:clear && php artisan cache:clear && php artisan route:clear && php artisan view:clear && php artisan migrate --force --isolated && (while true; do php artisan schedule:run --no-interaction 2>&1; sleep 60; done) & php -d upload_max_filesize=128M -d post_max_size=256M -d max_execution_time=300 -d max_input_time=300 -S 0.0.0.0:$PORT -t public server.php"
