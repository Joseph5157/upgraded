[phases.setup]
nixPkgs = ["php82", "php82Extensions.pdo", "php82Extensions.pdo_mysql", "php82Extensions.mbstring", "php82Extensions.tokenizer", "php82Extensions.xml", "php82Extensions.ctype", "php82Extensions.fileinfo", "php82Extensions.bcmath", "php82Extensions.curl", "php82Extensions.zip", "php82Extensions.gd", "php82Packages.composer", "nodejs_20"]

[phases.install]
cmds = [
  "composer install --no-dev --optimize-autoloader --no-interaction",
  "npm install",
  "npm run build"
]

[phases.build]
cmds = [
  "php artisan storage:link"
]

[start]
cmd = "php artisan config:clear && php artisan view:clear && php artisan route:clear && php artisan migrate --force && php artisan db:seed --force && php -S 0.0.0.0:$PORT -t public"